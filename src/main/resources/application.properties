# Application
spring.application.name=finance-backend
server.port=8080

# H2 Database (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for development inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=YTk4ZjJlNmQ3YzFiNGE1ZjhkM2UwYjZhMWMyZDRlNWY3YjhkOWEzZTJmMWM0YjVhNmQ4ZTNmMGE5YjdjNWQy
app.jwt.expiration-ms=86400000

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
